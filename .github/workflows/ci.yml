# CI/CD pipeline for extensionchecker-app.
#
# Phase 1 (parallel):
#   - dependency-review: SCA check for vulnerable deps (PRs only)
#   - ci:       lint, test with coverage, build (skipped on weekly schedule)
#   - security: CodeQL static analysis (runs on all triggers including weekly)
#
# Triggers:
#   - pull_request:      full pipeline
#   - push to main:      full pipeline
#   - schedule (Tue 03:23 UTC): CodeQL security scan only
#   - workflow_dispatch:  full pipeline

name: CI/CD
run-name: "CI/CD — ${{ github.event_name == 'schedule' && 'weekly security scan' || github.event_name == 'push' && github.ref_name || github.head_ref || 'manual' }}"

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '23 3 * * 2'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ============================================================================
  # Phase 1: Quality & Security (parallel)
  # ============================================================================

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  ci:
    name: Lint, Test & Build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install
        working-directory: src
        run: npm ci

      - name: Lint
        working-directory: src
        run: npm run lint

      - name: Test
        working-directory: src
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            src/shared/coverage/lcov.info,
            src/engine/coverage/lcov.info,
            src/backend/coverage/lcov.info,
            src/frontend/coverage/lcov.info
          verbose: true
          fail_ci_if_error: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build
        working-directory: src
        run: npm run build

  security:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          queries: security-extended,security-and-quality

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install
        working-directory: src
        run: npm ci

      - name: Build
        working-directory: src
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
